name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build tarball
        run: |
          tar -czf mtproxy-panel.tar.gz \
            --exclude='panel/__pycache__' \
            install.sh panel

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            install.sh
            mtproxy-panel.tar.gz
          generate_release_notes: true